<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudioClip Studio Pro</title>
    <style>
        :root {
            --bg-dark: #0f111a;
            --panel-bg: #1a1d2e;
            --accent-red: #ff3344;
            --accent-green: #00e676;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --border: #2a2f45;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .studio-container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h2 {
            margin-top: 0;
            font-size: 24px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex: 1;
            background: #0b0c16;
            border: 1px solid var(--border);
            padding: 14px 18px;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-red);
        }

        button {
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        .btn-load {
            background: #2b304a;
            color: #fff;
        }

        .btn-load:hover {
            background: #3a4164;
        }

        .btn-cut {
            background: var(--accent-red);
            color: white;
            width: 100%;
            padding: 14px;
            margin-top: 20px;
        }

        .btn-cut:hover {
            background: #e02233;
            transform: translateY(-1px);
        }

        .btn-cut:disabled {
            background: #4a1f24;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .btn-download {
            background: var(--accent-green);
            color: #0f111a;
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            font-size: 16px;
        }

        .btn-download:hover {
            background: #00c862;
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.4);
        }

        .workspace {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .video-preview-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            background: #000;
            border: 1px solid var(--border);
            margin-bottom: 25px;
        }

        #thumbnailPreview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 0;
        }

        .duration-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .time-box label {
            display: block;
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        #status-panel {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            font-size: 14px;
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="studio-container">
        <h2>🎬 StudioClip Pro <span
                style="font-size:12px; background:#2b304a; padding:4px 8px; border-radius:4px; color:var(--text-muted)">v3.6-LocalServer</span>
        </h2>

        <div class="input-group">
            <input type="text" id="url" placeholder="Paste YouTube link here (e.g., https://youtu.be/...)">
            <button class="btn-load" onclick="loadVideoWorkspace()">Load Video</button>
        </div>

        <div class="workspace" id="studioWorkspace">
            <div class="video-preview-wrapper">
                <img id="thumbnailPreview" src="" alt="Video Workspace Preview">
            </div>

            <div class="duration-controls">
                <div class="time-box">
                    <label for="startTime">Start Position</label>
                    <input type="text" id="startTime" placeholder="00:01:00" value="00:01:00">
                </div>
                <div class="time-box">
                    <label for="endTime">End Position</label>
                    <input type="text" id="endTime" placeholder="00:01:20" value="00:01:20">
                </div>
            </div>

            <button id="cutBtn" class="btn-cut" onclick="processClipOnServer()">Cut Clip</button>

            <div id="status-panel"></div>

            <a id="downloadLink" style="text-decoration: none; display: none;">
                <button class="btn-download">💾 Download Clip Ready</button>
            </a>
        </div>
    </div>

    <script>
        let preparedBlobUrl = null;

        function getYoutubeId(url) {
            url = url.trim();
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function loadVideoWorkspace() {
            const urlInput = document.getElementById('url').value;
            const videoId = getYoutubeId(urlInput);

            if (!videoId) {
                alert('Could not parse YouTube ID. Please verify the URL.');
                return;
            }

            const thumbnailUrl = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
            document.getElementById('thumbnailPreview').src = thumbnailUrl;
            document.getElementById('studioWorkspace').style.display = 'block';

            document.getElementById('downloadLink').style.display = 'none';
            document.getElementById('status-panel').style.display = 'none';
            document.getElementById('cutBtn').disabled = false;
        }

        async function processClipOnServer() {
            const url = document.getElementById('url').value;
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;

            const statusPanel = document.getElementById('status-panel');
            const cutBtn = document.getElementById('cutBtn');
            const downloadLink = document.getElementById('downloadLink');

            if (preparedBlobUrl) window.URL.revokeObjectURL(preparedBlobUrl);
            downloadLink.style.display = 'none';

            statusPanel.style.display = 'block';
            statusPanel.innerText = "⚙️ Local server is streaming, cutting, and packaging your clip... Please wait.";
            statusPanel.style.background = '#2a2216';
            statusPanel.style.color = '#ffb300';
            cutBtn.disabled = true;

            try {
                // Point seamlessly to your new Vercel serverless path
                const response = await fetch('/api/clip', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, startTime, endTime })
                });

                const data = await response.json();
                if (!response.ok || !data.streamUrl) throw new Error('Pipeline rendering error.');

                // Directly attach the authorized stream to your download client interface
                downloadLink.href = data.streamUrl;
                downloadLink.target = "_blank"; // Opens the clean processing file in a fresh window

                statusPanel.innerText = "🎉 Stream Broker Link Generated Successfully!";
                statusPanel.style.background = '#122b1c';
                statusPanel.style.color = '#00e676';

                downloadLink.style.display = 'block';

            } catch (error) {
                statusPanel.innerText = "❌ Slicing failed. Check timestamp formats or look inside your terminal for errors.";
                statusPanel.style.background = '#2d191b';
                statusPanel.style.color = '#ff3344';
                cutBtn.disabled = false;
            }
        }
    </script>

</body>

</html>
